bundle:
  name: spotify_dab
  uuid: c2e98b26-e2cb-4dd4-af23-a33d9ec150ca

variables:
  catalog:
    description: Catalog name
  schema:
    description: Schema name

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405619266866771.11.azuredatabricks.net
    presets:
      source_linked_deployment: false  
    variables:
      catalog: spotify_cata
      schema: ${workspace.current_user.short_name}

      
  prod:
    mode: production
    workspace:
      host: https://adb-7405619266866771.11.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/kv22nov.verma@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/PROD/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: spotify_cata
      schema: prod
    permissions:
      - user_name: kv22nov.verma@outlook.com
        level: CAN_MANAGE
